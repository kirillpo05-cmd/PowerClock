# Daily price update: 13:00 UTC = 15:00 EET / 16:00 EEST — safely after
# Nord Pool publishes tomorrow's day-ahead prices (~13:45 EET).
name: Update price data

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      from:
        description: 'Backfill start (YYYY-MM-DD, Europe/Riga)'
        required: false
      to:
        description: 'Backfill end (YYYY-MM-DD, Europe/Riga)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Fetch prices
        env:
          FROM: ${{ inputs.from }}
          TO: ${{ inputs.to }}
        run: |
          if [ -n "$FROM" ] && [ -n "$TO" ]; then
            node scripts/fetch_prices.mjs --from "$FROM" --to "$TO"
          else
            node scripts/fetch_prices.mjs
          fi
      - name: Commit data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
          else
            git commit -m "data: update price snapshots"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Pushes made with GITHUB_TOKEN don't fire `on: push` workflows,
  # so the deploy is invoked explicitly.
  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
